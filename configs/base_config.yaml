# configs/base_config.yaml
# All other configs inherit and override from here

project:
  name: "slt-hybrid-ssl"
  version: "1.0.0"
  seed: 42

data:
  raw_videos_dir: "data/raw_videos/"
  interim_dir: "data/interim/"
  frames_dir: "data/interim/frames/"
  keypoints_dir: "data/interim/keypoints/"
  features_dir: "data/interim/features/"
  splits_dir: "data/splits/"
  train_csv: "data/splits/train.csv"
  val_csv: "data/splits/val.csv"
  test_csv: "data/splits/test.csv"

video:
  fps: 25
  frame_size: [224, 224]
  max_frames: 64
  channels: 3
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]

keypoints:
  extractor: "mediapipe"
  hands: true
  pose: true
  face: false
  confidence_threshold: 0.5
  num_hand_landmarks: 21
  num_pose_landmarks: 33

model:
  name: "hybrid_ssl_transformer"
  backbone: "resnet50"
  pretrained: true
  hidden_dim: 256
  num_heads: 8
  num_layers: 4
  dropout: 0.1
  vocab_size: 500
  max_seq_len: 64
  feature_dim: 2048
  keypoint_dim: 258  # (21+21+33) landmarks x 3 coords = 225, padded to 258

training:
  epochs: 50
  batch_size: 16
  learning_rate: 0.0003
  weight_decay: 0.01
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 5
  gradient_clip: 1.0
  early_stopping_patience: 10
  num_workers: 4

ssl:
  method: "masked_autoencoder"
  masking_ratio: 0.75
  mask_strategy: "random"
  temperature: 0.07
  pretraining_epochs: 30
  pretraining_lr: 0.0001
  pretraining_batch_size: 32

logging:
  log_dir: "logs/"
  save_dir: "models/"
  checkpoint_every: 5
  wandb: false
  tensorboard: true
  log_level: "INFO"
